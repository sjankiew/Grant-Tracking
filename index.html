<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ระบบบริหารจัดการและติดตามทุนวิจัย</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Noto+Serif+Thai:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ivory:#FAF7F0;--paper:#FFFFFF;--ink:#1F2933;--muted:#6B7280;
    --line:#E3DCCB;--oxblood:#7B2D2D;--blue:#2B5F8A;--amber:#C98A12;
    --green:#2E7D5B;--red:#C0392B;--grey:#6B7280;--violet:#5B4B8A;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"IBM Plex Sans Thai",sans-serif;background:var(--ivory);color:var(--ink);font-size:14px;}
  h1,h2,h3{font-family:"Noto Serif Thai",serif;margin:0;}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;}
  .btn{background:var(--blue);color:#fff;padding:9px 16px;font-weight:600;}
  .btn:hover{filter:brightness(.95);}
  .btn.ghost{background:transparent;color:var(--blue);border:1px solid var(--line);}
  .btn.danger{background:var(--red);}
  .btn.amber{background:var(--amber);}
  .btn.green{background:var(--green);}
  input,select,textarea{font-family:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;width:100%;background:#fff;}
  label{font-size:12px;color:var(--muted);font-weight:600;display:block;margin-bottom:4px;}
  .hidden{display:none!important;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:18px;}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;color:#fff;}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid var(--line);}
  /* Login */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  #login .box{width:380px;max-width:100%;}
  #login h1{color:var(--oxblood);font-size:22px;margin-bottom:4px;}
  .quick{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
  .quick button{background:var(--ivory);border:1px solid var(--line);color:var(--ink);padding:8px;font-size:12px;font-weight:600;}
  /* App shell */
  #app{display:grid;grid-template-columns:230px 1fr;min-height:100vh;}
  #side{background:#22303C;color:#D7DEE4;padding:18px 12px;display:flex;flex-direction:column;}
  #side h2{color:#fff;font-size:16px;padding:0 8px 14px;}
  #side .nav{padding:10px 12px;border-radius:8px;color:#C3CCD4;font-weight:600;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;cursor:pointer;}
  #side .nav:hover{background:#2C3D4B;}
  #side .nav.active{background:var(--blue);color:#fff;}
  #side .nav .n{background:var(--amber);color:#000;border-radius:999px;font-size:11px;padding:0 7px;}
  #side .who{margin-top:auto;font-size:12px;color:#9AA7B1;padding:10px 8px;border-top:1px solid #33424F;}
  #main{padding:22px 26px;overflow:auto;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .grid{display:grid;gap:14px;}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));}
  .kpi .v{font-size:24px;font-weight:700;font-family:"Noto Serif Thai",serif;}
  .kpi .l{font-size:12px;color:var(--muted);}
  table{width:100%;border-collapse:collapse;background:#fff;}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);font-size:13px;}
  th{color:var(--muted);font-size:12px;}
  tr.click:hover{background:var(--ivory);cursor:pointer;}
  .bar{height:8px;background:var(--line);border-radius:999px;overflow:hidden;}
  .bar>i{display:block;height:100%;background:var(--blue);}
  /* Drawer */
  #scrim{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:10;}
  #drawer{position:fixed;top:0;right:0;height:100vh;width:520px;max-width:92vw;background:#fff;box-shadow:-8px 0 24px rgba(0,0,0,.15);overflow:auto;padding:22px;z-index:11;}
  .sect{margin-top:18px;}
  .sect h3{font-size:14px;color:var(--oxblood);margin-bottom:8px;border-bottom:1px solid var(--line);padding-bottom:6px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .muted{color:var(--muted);}
  .err{color:var(--red);font-size:12px;margin-top:6px;}
  .note{background:#FFF6E8;border:1px solid #F0DCB0;color:#7a5b12;padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:14px;}
  a{color:var(--blue);}
  /* Loading */
  .loading{display:flex;align-items:center;gap:10px;color:var(--muted);padding:20px;}
  .spinner{width:20px;height:20px;border:2px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  /* Modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:20;display:flex;align-items:center;justify-content:center;padding:16px;}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:580px;max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
  .modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px 16px;border-bottom:1px solid var(--line);}
  .modal-header h2{font-size:18px;color:var(--oxblood);}
  .modal-body{padding:20px 24px;}
  .modal-footer{padding:16px 24px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;}
  .field{margin-bottom:14px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
  .field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
  .reviewer-card{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;background:var(--ivory);}
  .reviewer-card .rc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-weight:600;font-size:13px;color:var(--oxblood);}
  .section-label{font-size:13px;font-weight:700;color:var(--ink);margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line);}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(43,95,138,.12);}
  .btn-icon{background:transparent;border:1px solid var(--line);color:var(--red);padding:4px 10px;font-size:12px;border-radius:6px;}
  .btn-icon:hover{background:#fff0f0;}
  .saving{opacity:.6;pointer-events:none;}
</style>
</head>
<body>

<div id="login">
  <div class="box card">
    <!-- ★ เปลี่ยนที่ 2: ชื่อระบบใหม่ -->
    <h1>ระบบบริหารจัดการและติดตามทุนวิจัย</h1>
    <p class="muted" style="margin-top:0">สำนักงานบริหารงานวิจัย</p>
    <div style="margin-bottom:10px"><label>ชื่อผู้ใช้</label><input id="uid" value=""/></div>
    <div style="margin-bottom:12px"><label>รหัสผ่าน</label><input id="pwd" type="password" value="" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="btn" style="width:100%" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div id="loginerr" class="err"></div>
    <div class="quick">
      <button onclick="quick('admin')">admin</button>
      <button onclick="quick('staff')">staff</button>
      <button onclick="quick('dean')">dean</button>
      <button onclick="quick('reviewer')">reviewer</button>
    </div>
    <p class="muted" style="font-size:11px;margin-bottom:0">บัญชีทดสอบ รหัสผ่าน <b>1234</b> ทุกบัญชี</p>
  </div>
</div>

<div id="app" class="hidden">
  <aside id="side">
    <h2>ทุนวิจัย</h2>
    <div id="nav"></div>
    <div class="who">
      <div id="whoName"></div>
      <div id="whoRole" class="muted"></div>
      <button class="btn ghost" style="margin-top:8px;width:100%;color:#D7DEE4;border-color:#3a4a57" onclick="logout()">ออกจากระบบ</button>
    </div>
  </aside>
  <main id="main">
    <div class="topbar"><h1 id="pageTitle" style="font-size:20px"></h1><div id="pageActions"></div></div>
    <div id="view"></div>
  </main>
</div>

<div id="scrim" class="hidden" onclick="closeDrawer()"></div>
<div id="drawer" class="hidden"></div>
<div id="modal-root"></div>

<script>
// ======== ใส่ URL GAS Web App (/exec) ========
const API_URL = "https://script.google.com/macros/s/AKfycbxW2HESXQGHsqEA4CdVXm-w6kye1d1RrvwEWsVYysY7TwB4iE2Mgqve_1KXj2GQF6VX/exec";

// ======== STATE ========
let S = { user:null, token:null, projects:[], budget:[], due:[], users:[], page:"dash" };

// ======== UTILS ========
const fmtBaht = n => Number(n||0).toLocaleString("th-TH",{maximumFractionDigits:0});
const fmtDate = s => s ? new Date(s).toLocaleDateString("th-TH",{day:"numeric",month:"short",year:"numeric"}) : "—";
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

const STATUS_COLOR = {
  "ทำสัญญาแล้ว":"var(--blue)","รายงานความก้าวหน้าครั้งที่ 1":"var(--blue)",
  "ส่งเล่มสมบูรณ์":"var(--violet)","รอการประเมิน":"var(--amber)",
  "ปิดโครงการ":"var(--green)","ยุติโครงการ":"var(--grey)","รอคืนเงิน":"var(--red)"
};
const HEALTH_COLOR = {"ปกติ":"var(--green)","ใกล้กำหนด":"var(--amber)","ล่าช้า":"var(--red)","เสร็จสิ้น":"var(--grey)","แจ้งเตือนแล้ว":"var(--blue)"};
const statusBadge = s => `<span class="badge" style="background:${STATUS_COLOR[s]||'var(--grey)'}">${esc(s)}</span>`;
const healthBadge = h => `<span class="pill" style="color:${HEALTH_COLOR[h]||'var(--grey)'};border-color:${HEALTH_COLOR[h]||'var(--grey)'}">${esc(h)}</span>`;
const kpi = (v,l,c) => `<div class="card kpi"><div class="v" style="color:${c||'var(--ink)'}">${v}</div><div class="l">${l}</div></div>`;
const loading = () => `<div class="loading"><div class="spinner"></div>กำลังโหลด...</div>`;

// ======== CACHE (ลด GAS cold-start) ========
const CACHE_TTL = 60000;
let _cache = {};
function cacheGet(k){ const c=_cache[k]; return (c && Date.now()-c.t < CACHE_TTL) ? c.v : null; }
function cacheSet(k,v){ _cache[k]={v,t:Date.now()}; }
function cacheClear(){ _cache={}; }

// ======== API ========
async function api(action, payload={}, useCache=false) {
  const cacheKey = action + JSON.stringify(payload);
  if(useCache){ const hit = cacheGet(cacheKey); if(hit) return hit; }
  const url = new URL(API_URL);
  url.searchParams.set("action", action);
  url.searchParams.set("token", S.token||"");
  url.searchParams.set("payload", JSON.stringify(payload));
  const res = await fetch(url.toString(), { method:"GET", redirect:"follow" });
  const data = await res.json();
  if(data.ok===false && data.error==="unauthorized"){ logout(); throw new Error("เซสชันหมดอายุ"); }
  if(useCache && data.ok) cacheSet(cacheKey, data);
  return data;
}

// ======== AUTH ========
function quick(id){ document.getElementById("uid").value=id; document.getElementById("pwd").value="1234"; doLogin(); }

async function doLogin(){
  const errEl = document.getElementById("loginerr");
  errEl.textContent = "";
  const userId = document.getElementById("uid").value.trim();
  const password = document.getElementById("pwd").value;
  if(!userId||!password){ errEl.textContent="กรุณากรอกข้อมูลให้ครบ"; return; }
  try {
    const r = await api("login", {userId, password});
    if(!r.ok){ errEl.textContent = r.error||"เข้าสู่ระบบไม่สำเร็จ"; return; }
    S.user  = r.user;
    S.token = r.token;
    const menu = MENUS[r.user.role]||[];
    S.page = menu[0] ? menu[0][0] : "dash";
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("whoName").textContent = r.user.name;
    document.getElementById("whoRole").textContent = r.user.roleLabel;
    buildNav();
    render();
    loadData();
  } catch(e){ errEl.textContent = e.message; }
}

function logout(){
  S = {user:null,token:null,projects:[],budget:[],due:[],users:[],page:"dash"};
  document.getElementById("app").classList.add("hidden");
  document.getElementById("login").classList.remove("hidden");
  document.getElementById("uid").value="";
  document.getElementById("pwd").value="";
}

// ======== NAV ========
const MENUS = {
  admin:   [["dash","Dashboard"],["projects","โครงการวิจัย"],["budget","งบประมาณรายปี"],["reminders","การติดตาม/แจ้งเตือน"],["evals","การประเมิน"],["users","จัดการผู้ใช้"]],
  staff:   [["dash","Dashboard"],["projects","โครงการวิจัย"],["budget","งบประมาณรายปี"],["reminders","การติดตาม/แจ้งเตือน"],["evals","การประเมิน"]],
  dean:    [["overview","ภาพรวมผู้บริหาร"]],
  reviewer:[["myreviews","งานประเมินของฉัน"]]
};

function buildNav(){
  const menu = MENUS[S.user.role]||[];
  document.getElementById("nav").innerHTML = menu.map(([k,label])=>{
    const badge = k==="reminders" && S.due.length ? `<span class="n">${S.due.length}</span>` : "";
    return `<div class="nav${k===S.page?' active':''}" onclick="go('${k}')">${esc(label)}${badge}</div>`;
  }).join("");
}

function go(page){
  S.page = page;
  buildNav();
  render();
}

// ======== DATA LOADING ========
async function loadData(forceRefresh=false){
  if(forceRefresh) cacheClear();
  const cachedProjects = !forceRefresh ? cacheGet("listProjects{}") : null;
  if(cachedProjects){ S.projects = cachedProjects.data||[]; buildNav(); render(); }
  const prP  = api("listProjects", {}, !forceRefresh);
  const bgP  = api("listBudget",   {}, !forceRefresh);
  const duP  = api("dueSoon",      {}, false);
  prP.then(pr=>{ S.projects=pr.data||[]; buildNav(); render(); }).catch(console.error);
  bgP.then(bg=>{ S.budget=bg.data||[]; if(S.page==="budget"||S.page==="overview") render(); }).catch(console.error);
  duP.then(du=>{ S.due=du.data||[]; buildNav(); if(S.page==="reminders") render(); }).catch(console.error);
  await Promise.allSettled([prP, bgP, duP]);
  if(["admin","staff"].includes(S.user.role)){
    try { const ru=await api("listUsers",{},!forceRefresh); S.users=ru.data||[]; if(S.page==="users") render(); } catch(e){}
  }
  buildNav(); render();
}

async function refresh(){ await loadData(true); }

// ======== RENDER ========
const PAGE_TITLE = {
  dash:"Dashboard ทีมงาน", projects:"โครงการวิจัย", budget:"งบประมาณรายปี",
  reminders:"การติดตาม / แจ้งเตือน", evals:"การประเมิน", users:"จัดการผู้ใช้",
  overview:"ภาพรวมผู้บริหาร", myreviews:"งานประเมินของฉัน"
};
const VIEW_FN = {
  dash:viewDash, projects:viewProjects, budget:viewBudget,
  reminders:viewReminders, evals:viewEvals, users:viewUsers,
  overview:viewOverview, myreviews:viewMyReviews
};

function render(){
  document.getElementById("pageTitle").textContent = PAGE_TITLE[S.page]||"";
  document.getElementById("pageActions").innerHTML = "";
  const v = document.getElementById("view");
  const fn = VIEW_FN[S.page];
  if(fn) fn(v); else v.innerHTML = "";
}

// ======== VIEWS ========
// ★ เปลี่ยนที่ 1: ตารางโครงการแสดงเลขที่โครงการ + รหัสโครงการ
function projectTable(list){
  if(!list.length) return `<p class="muted">ไม่มีข้อมูล</p>`;
  return `<table><thead><tr>
    <th>รหัส / เลขที่โครงการ</th><th>ชื่อโครงการ</th><th>หัวหน้า</th>
    <th>สถานะ</th><th>สุขภาพ</th><th>กำหนดถัดไป</th>
  </tr></thead><tbody>${list.map(p=>`
    <tr class="click" onclick="openDrawer('${p.id}')">
      <td>
        ${p.projectNo ? `<div style="font-weight:700">${esc(p.projectNo)}</div>` : ''}
        <div class="muted" style="font-size:11px">${esc(p.id)}</div>
      </td>
      <td>${esc(p.title)}</td>
      <td>${esc(p.pi)}</td>
      <td>${statusBadge(p.status)}</td>
      <td>${healthBadge(p.health)}</td>
      <td>${p.milestone ? fmtDate(p.milestone.date)+` <span class="muted">(${p.milestone.daysLeft} วัน)</span>` : "—"}</td>
    </tr>`).join("")}</tbody></table>`;
}

function viewDash(v){
  const P = S.projects;
  if(!P.length){ v.innerHTML=loading(); return; }
  const active = P.filter(p=>["ปกติ","ใกล้กำหนด","ล่าช้า"].includes(p.health)).length;
  const late   = P.filter(p=>p.health==="ล่าช้า").length;
  const soon   = P.filter(p=>p.health==="ใกล้กำหนด").length;
  const paid   = P.reduce((s,p)=>s+p.paid,0);
  v.innerHTML = `
    <div class="grid kpis" style="margin-bottom:16px">
      ${kpi(P.length,"โครงการทั้งหมด")}
      ${kpi(active,"กำลังดำเนินการ")}
      ${kpi(soon,"ใกล้กำหนด","var(--amber)")}
      ${kpi(late,"ล่าช้า","var(--red)")}
      ${kpi(fmtBaht(paid)+" ฿","เบิกจ่ายสะสม")}
    </div>
    <div class="card">${projectTable(P)}</div>`;
}

function viewProjects(v){
  if(["admin","staff"].includes(S.user.role))
    document.getElementById("pageActions").innerHTML =
      `<button class="btn" onclick="showAddProject()">+ เพิ่มโครงการ</button>`;
  v.innerHTML = `<div class="card">${projectTable(S.projects)}</div>`;
}

// ★ เปลี่ยนที่ 3: หน้างบประมาณแสดงสรุปจำนวนโครงการรายปี
function viewBudget(v){
  if(["admin","staff"].includes(S.user.role))
    document.getElementById("pageActions").innerHTML =
      `<button class="btn" onclick="showAddBudget()">+ เพิ่มปีงบประมาณ</button>`;
  if(!S.budget.length){ v.innerHTML=loading(); return; }

  // สรุปรวมทุกปี
  const totalProjects = S.budget.reduce((s,b) => s + (b.projectCount||0), 0);
  const totalAlloc    = S.budget.reduce((s,b) => s + b.allocated, 0);
  const totalCommit   = S.budget.reduce((s,b) => s + b.committed, 0);
  const totalPaid     = S.budget.reduce((s,b) => s + b.paid, 0);

  v.innerHTML = `
    <div class="grid kpis" style="margin-bottom:16px">
      ${kpi(totalProjects,"โครงการวิจัยทั้งหมด","var(--blue)")}
      ${kpi(fmtBaht(totalAlloc)+" ฿","งบจัดสรรรวม")}
      ${kpi(fmtBaht(totalCommit)+" ฿","งบผูกพันรวม","var(--amber)")}
      ${kpi(fmtBaht(totalPaid)+" ฿","เบิกจ่ายรวม","var(--green)")}
    </div>
    <div class="card"><table><thead><tr>
    <th>ปีงบประมาณ (พ.ศ.)</th>
    <th style="text-align:center">จำนวนโครงการ</th>
    <th>จัดสรร</th><th>ผูกพัน</th>
    <th>เบิกจ่าย</th><th>คงเหลือ</th>
    <th style="width:160px">สัดส่วนผูกพัน</th><th></th>
  </tr></thead><tbody>${S.budget.map(b=>{
    const pct = b.allocated ? Math.min(100,Math.round(b.committed/b.allocated*100)) : 0;
    return `<tr>
      <td><b>${b.year}</b></td>
      <td style="text-align:center">
        <span class="badge" style="background:var(--blue);font-size:14px;padding:4px 14px">${b.projectCount||0}</span>
      </td>
      <td>${fmtBaht(b.allocated)}</td><td>${fmtBaht(b.committed)}</td>
      <td>${fmtBaht(b.paid)}</td><td>${fmtBaht(b.remaining)}</td>
      <td><div class="bar"><i style="width:${pct}%"></i></div>
        <span class="muted" style="font-size:11px">${pct}%</span></td>
      <td><button class="btn ghost" style="padding:5px 10px;font-size:12px"
        onclick='showAddBudget(${JSON.stringify(b)})'>✎ แก้ไข</button></td>
    </tr>`;}).join("")}</tbody></table></div>`;
}

function viewReminders(v){

async function closeProjectAfterEval(projectId){
  if(!confirm(`ยืนยันเปลี่ยนสถานะ "${projectId}" เป็น "ปิดโครงการ" ?`)) return;
  const p = S.projects.find(x=>x.id===projectId);
  if(!p) return;
  const payload = Object.assign({}, p, {
    id: p.id, status: "ปิดโครงการ",
    pi: p.pi, piPhone: p.piPhone, piEmail: p.piEmail,
    projectNo: p.projectNo,
    _note: "ผู้ประเมินทุกท่านให้ผ่าน", _by: S.user.id
  });
  const r = await api("updateProject", payload);
  if(r.ok){ await refresh(); alert("เปลี่ยนสถานะเป็น ปิดโครงการ แล้ว"); }
  else alert("ไม่สำเร็จ: "+(r.error||""));
}

function setRevisionDeadline(projectId){
  const deadline = prompt("กำหนดวันครบกำหนดส่งฉบับแก้ไข (YYYY-MM-DD):\nเช่น 2026-07-18");
  if(!deadline) return;
  if(!/^\d{4}-\d{2}-\d{2}$/.test(deadline)){ alert("รูปแบบวันที่ไม่ถูกต้อง"); return; }
  const p = S.projects.find(x=>x.id===projectId);
  if(!p) return;
  const payload = Object.assign({}, p, {
    id: p.id, pi: p.pi, piPhone: p.piPhone, piEmail: p.piEmail,
    projectNo: p.projectNo,
    revisionDeadline: deadline, _by: S.user.id
  });
  api("updateProject", payload).then(r=>{
    if(r.ok){ refresh(); } else alert("ไม่สำเร็จ: "+(r.error||""));
  });
}

async function sendReminder(id){
  if(!confirm("ส่งอีเมลแจ้งเตือนไปยังผู้ขอทุน?")) return;
  const r = await api("sendReminder",{projectId:id});
  if(r.ok){
    const p = S.projects.find(x=>x.id===id);
    if(p) p.health = "แจ้งเตือนแล้ว";
    S.due = S.due.filter(d=>d.id!==id);
    buildNav(); render();
    showToast("ส่งอีเมลแล้ว — สถานะเปลี่ยนเป็น 'แจ้งเตือนแล้ว'");
  } else alert("ส่งไม่สำเร็จ: "+(r.error||""));
}

async function saveTracking(projectId){
  const btn   = document.getElementById("saveTrackBtn");
  const errEl = document.getElementById("trackErr");
  errEl.textContent = "";
  const date    = document.getElementById("tr_date").value;
  const channel = document.getElementById("tr_channel").value;
  const note    = document.getElementById("tr_note").value.trim();
  const status  = document.getElementById("tr_status").value;
  if(!date){ errEl.textContent="กรุณาเลือกวันที่"; return; }
  btn.classList.add("saving"); btn.textContent="กำลังบันทึก...";
  const CHANNEL_LABEL = {"email":"อีเมล","phone":"โทรศัพท์","line":"Line","meeting":"ประชุม","letter":"หนังสือราชการ","other":"อื่น ๆ"};
  const channelLabel = CHANNEL_LABEL[channel]||channel;
  const STATUS_LABEL = {"contacted":"ติดต่อได้แล้ว","no_response":"ยังไม่ได้รับการตอบกลับ","scheduled":"นัดหมายเรียบร้อย","escalated":"ส่งเรื่องต่อผู้บังคับบัญชา"};
  const statusLabel  = STATUS_LABEL[status]||status;
  try {
    const r = await api("logReminder",{projectId, channel:channelLabel, note, date, trackStatus:statusLabel});
    const p = S.projects.find(x=>x.id===projectId);
    if(p) p.health = "แจ้งเตือนแล้ว";
    S.due = S.due.filter(d=>d.id!==projectId);
    buildNav(); render();
    closeModal();
    showToast(`บันทึกการติดตาม "${channelLabel}" แล้ว`);
  } catch(e){
    btn.classList.remove("saving"); btn.textContent="บันทึกการติดตาม";
    errEl.textContent = e.message;
  }
}

async function saveUser(existingId){
  const btn   = document.getElementById("saveUserBtn");
  const errEl = document.getElementById("userErr");
  if(!btn || !errEl) return;
  errEl.textContent = "";
  const idInput   = document.getElementById("u_id");
  const id        = existingId || (idInput ? idInput.value.trim() : "");
  const name      = document.getElementById("u_name").value.trim();
  const role      = document.getElementById("u_role").value;
  const phone     = document.getElementById("u_phone").value.trim();
  const email     = document.getElementById("u_email").value.trim();
  const pwd       = document.getElementById("u_pwd").value;
  const sel       = document.getElementById("u_role");
  const roleLabel = sel.options[sel.selectedIndex].dataset.label || role;
  if(!id)   { errEl.textContent="กรุณากรอกรหัสผู้ใช้ (ID)"; return; }
  if(id.includes(" ")){ errEl.textContent="รหัสผู้ใช้ต้องไม่มีช่องว่าง"; return; }
  if(!name) { errEl.textContent="กรุณากรอกชื่อ-นามสกุล"; return; }
  if(!existingId && !pwd){ errEl.textContent="กรุณากรอกรหัสผ่าน"; return; }
  const payload = { id, name, role, roleLabel, phone, email };
  if(pwd) payload.password = pwd;
  btn.classList.add("saving"); btn.textContent="กำลังบันทึก...";
  try {
    const r = await api("upsertUser", payload);
    if(!r.ok){
      errEl.textContent = r.error||"บันทึกไม่สำเร็จ";
      btn.classList.remove("saving");
      btn.textContent = existingId ? "บันทึกการแก้ไข" : "เพิ่มผู้ใช้งาน";
      return;
    }
    closeModal();
    const ru = await api("listUsers");
    S.users = ru.data || [];
    viewUsers(document.getElementById("view"));
    showToast(existingId ? `แก้ไขข้อมูล "${name}" แล้ว` : `เพิ่มผู้ใช้ "${name}" (${id}) แล้ว`);
  } catch(e){
    if(errEl) errEl.textContent = e.message;
    btn.classList.remove("saving");
    btn.textContent = existingId ? "บันทึกการแก้ไข" : "เพิ่มผู้ใช้งาน";
  }
}

async function deleteUser(userId, userName){
  if(userId === S.user.id){ alert("ไม่สามารถลบบัญชีของตัวเองได้"); return; }
  if(!confirm(`ยืนยันลบผู้ใช้ "${userName}" (${userId}) ?\nการกระทำนี้ไม่สามารถย้อนกลับได้`)) return;
  const r = await api("deleteUser",{userId});
  if(r.ok){
    const ru = await api("listUsers");
    S.users = ru.data || [];
    viewUsers(document.getElementById("view"));
    showToast(`ลบผู้ใช้ "${userName}" แล้ว`);
  } else alert("ลบไม่สำเร็จ: "+(r.error||""));
}

function showToast(msg){
  let t = document.getElementById("toast");
  if(!t){ t=document.createElement("div"); t.id="toast"; t.style.cssText="position:fixed;bottom:24px;right:24px;background:#1F2933;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:99;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:opacity .3s"; document.body.appendChild(t); }
  t.textContent = msg; t.style.opacity="1";
  clearTimeout(t._t);
  t._t = setTimeout(()=>{ t.style.opacity="0"; }, 3000);
}

      ${(()=>{
        const total = P.length || 1;
        const order = ["ทำสัญญาแล้ว","รายงานความก้าวหน้าครั้งที่ 1","ส่งเล่มสมบูรณ์","รอการประเมิน","ปิดโครงการ","ยุติโครงการ","รอคืนเงิน"];
        const colors = {"ทำสัญญาแล้ว":"#2B5F8A","รายงานความก้าวหน้าครั้งที่ 1":"#2B5F8A","ส่งเล่มสมบูรณ์":"#5B4B8A","รอการประเมิน":"#C98A12","ปิดโครงการ":"#2E7D5B","ยุติโครงการ":"#6B7280","รอคืนเงิน":"#C0392B"};
        return order.filter(s=>byStatus[s]).map(s=>{
          const n=byStatus[s], pct=Math.round(n/total*100);
          return `<div style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
              <span style="font-size:13px">${statusBadge(s)}</span>
              <span style="font-weight:700;font-size:15px;font-family:'Noto Serif Thai',serif">${n} <span style="font-size:11px;color:var(--muted);font-weight:400">โครงการ (${pct}%)</span></span>
            </div>
            <div style="height:10px;background:var(--line);border-radius:999px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:${colors[s]||'var(--grey)'};border-radius:999px;transition:width .4s ease"></div>
            </div>
          </div>`;
        }).join("");
      })()}
    </div>`;
}

function viewMyReviews(v){

async function doSubmitReview(projectId, result){
  const noteEl = document.getElementById("rv_note");
  const errEl  = document.getElementById("rv_err");
  const note   = noteEl ? noteEl.value.trim() : "";
  if(result==="ให้แก้ไข" && !note){ errEl.textContent="กรุณาระบุหมายเหตุ/เหตุผลที่ต้องแก้ไข"; return; }
  document.querySelectorAll("#drawer .btn.green, #drawer .btn.amber").forEach(b=>{ b.disabled=true; b.style.opacity=".6"; });
  const r = await api("setEvaluation",{projectId,reviewerName:S.user.name,result,note});
  if(r.ok){ await refresh(); openReviewDrawer(projectId); }
  else { if(errEl) errEl.textContent="บันทึกไม่สำเร็จ: "+(r.error||""); document.querySelectorAll("#drawer .btn.green, #drawer .btn.amber").forEach(b=>{ b.disabled=false; b.style.opacity=""; }); }
}

function resetReviewForm(projectId){
  const p = S.projects.find(x=>x.id===projectId);
  if(!p) return;
  const me = S.user.name;
  const rev = (p.reviewers||[]).find(r=>r.name===me);
  if(rev) rev.status = "รอประเมิน";
  openReviewDrawer(projectId);
}

        <div class="field"><label>อีเมลหัวหน้า</label><input id="f_piEmail" type="email" value="${esc(p.piEmail||'')}" placeholder="name@univ.ac.th"/></div>
        <div class="field"><label>วงเงินรวม (฿) *</label><input id="f_total" type="number" value="${p.total||''}" placeholder="500000"/></div>
      </div>

      <div class="field-row">
        <div class="field"><label>วันทำสัญญา *</label><input id="f_contractDate" type="date" value="${p.contractDate||''}"/></div>
        <div class="field"><label>ระยะเวลา (เดือน) *</label><input id="f_duration" type="number" value="${p.durationMonths||''}" placeholder="12"/></div>
      </div>

      <div class="field-row">
        <div class="field"><label>สถานะ</label>
          <select id="f_status">${statuses.map(s=>`<option${p.status===s?" selected":""}>${s}</option>`).join("")}</select>
        </div>
        <div class="field"><label>กำหนดส่งฉบับแก้ไข</label><input id="f_revision" type="date" value="${p.revisionDeadline||''}"/></div>
      </div>

      <div class="section-label">งวดการจ่ายเงิน</div>
      <div class="field-row3">
        <div class="field"><label>งวดที่ 1 (฿)</label><input id="f_i1" type="number" value="${i1||''}" placeholder="0"/></div>
        <div class="field"><label>งวดที่ 2 (฿)</label><input id="f_i2" type="number" value="${i2||''}" placeholder="0"/></div>
        <div class="field"><label>งวดที่ 3 (฿)</label><input id="f_i3" type="number" value="${i3||''}" placeholder="0"/></div>
      </div>

      <div class="section-label">ผู้ประเมิน (สูงสุด 3 ท่าน)</div>
      <div class="field-row3">
        <div class="field"><label>ท่านที่ 1</label><input id="f_r1" value="${esc(r1)}" placeholder="ชื่อ นามสกุล"/></div>
        <div class="field"><label>ท่านที่ 2</label><input id="f_r2" value="${esc(r2)}" placeholder="ชื่อ นามสกุล"/></div>
        <div class="field"><label>ท่านที่ 3</label><input id="f_r3" value="${esc(r3)}" placeholder="ชื่อ นามสกุล"/></div>
      </div>
    </div>
    <div class="modal-footer">
      <div id="projErr" style="color:var(--red);font-size:12px;margin-right:auto;align-self:center"></div>
      <button class="btn ghost" onclick="closeModal()">ยกเลิก</button>
      <button class="btn" id="saveProjBtn" onclick="saveProject()">${isEdit?"บันทึกการแก้ไข":"สร้างโครงการ"}</button>
    </div>
  </div>`);
}

// ★ เปลี่ยนที่ 1: saveProject ส่ง projectNo ไปด้วย
async function saveProject(){
  const errEl = document.getElementById("projErr");
  const btn   = document.getElementById("saveProjBtn");
  errEl.textContent = "";

  const editId     = document.getElementById("f_editId").value;
  const projectNo  = document.getElementById("f_projectNo").value.trim();
  const title      = document.getElementById("f_title").value.trim();
  const pi         = document.getElementById("f_pi").value.trim();
  const dept       = document.getElementById("f_dept").value.trim();
  const budgetYear = Number(document.getElementById("f_year").value);
  const total      = Number(document.getElementById("f_total").value);
  const contractDate = document.getElementById("f_contractDate").value;
  const durationMonths = Number(document.getElementById("f_duration").value);
  const status     = document.getElementById("f_status").value;
  const revisionDeadline = document.getElementById("f_revision").value;
  const piPhone    = document.getElementById("f_piPhone").value.trim();
  const piEmail    = document.getElementById("f_piEmail").value.trim();

  if(!title){ errEl.textContent="กรุณากรอกชื่อโครงการ"; return; }
  if(!pi){ errEl.textContent="กรุณากรอกชื่อหัวหน้าโครงการ"; return; }
  if(!dept){ errEl.textContent="กรุณากรอกสาขา/คณะ"; return; }
  if(!total){ errEl.textContent="กรุณากรอกวงเงินรวม"; return; }
  if(!contractDate){ errEl.textContent="กรุณาเลือกวันทำสัญญา"; return; }
  if(!durationMonths){ errEl.textContent="กรุณากรอกระยะเวลา"; return; }

  const installments = [
    {no:1, amount:Number(document.getElementById("f_i1").value)||0, paid:false},
    {no:2, amount:Number(document.getElementById("f_i2").value)||0, paid:false},
    {no:3, amount:Number(document.getElementById("f_i3").value)||0, paid:false}
  ];

  // ถ้าแก้ไข ต้อง preserved สถานะ paid เดิม
  if(editId){
    const old = S.projects.find(x=>x.id===editId);
    if(old && old.installments){
      old.installments.forEach(oi => {
        const ni = installments.find(x=>x.no===oi.no);
        if(ni) ni.paid = oi.paid;
      });
    }
  }

  const reviewers = [
    document.getElementById("f_r1").value.trim(),
    document.getElementById("f_r2").value.trim(),
    document.getElementById("f_r3").value.trim()
  ].filter(n=>n).map(name=>({name}));

  const payload = {
    projectNo, title, pi, dept, budgetYear, total,
    contractDate, durationMonths, status, revisionDeadline,
    piPhone, piEmail, installments, reviewers,
    _by: S.user.id
  };
  if(editId) payload.id = editId;

  btn.classList.add("saving"); btn.textContent="กำลังบันทึก...";
  try {
    const action = editId ? "updateProject" : "createProject";
    const r = await api(action, payload);
    if(!r.ok){
      errEl.textContent = r.error||"บันทึกไม่สำเร็จ";
      btn.classList.remove("saving");
      btn.textContent = editId ? "บันทึกการแก้ไข" : "สร้างโครงการ";
      return;
    }
    closeModal();
    await refresh();
    showToast(editId ? `แก้ไขโครงการ "${title}" แล้ว` : `สร้างโครงการ "${title}" แล้ว (${r.id})`);
  } catch(e){
    errEl.textContent = e.message;
    btn.classList.remove("saving");
    btn.textContent = editId ? "บันทึกการแก้ไข" : "สร้างโครงการ";
  }
}

// ======== การจ่ายเงิน ========
async function togglePayment(projectId, installmentNo, isPaid){
  const p = S.projects.find(x=>x.id===projectId);
  if(!p) return;
  const inst = (p.installments||[]).find(i=>i.no===installmentNo);
  if(!inst) return;
  const newPaid = !isPaid;
  if(!confirm(newPaid ? `บันทึกจ่ายงวดที่ ${installmentNo} (${fmtBaht(inst.amount)} ฿)?` : `ยกเลิกการจ่ายงวดที่ ${installmentNo}?`)) return;
  const r = await api("setPayment",{projectId, installmentNo, amount:inst.amount, paid:newPaid});
  if(r.ok){ await refresh(); openDrawer(projectId); showToast(newPaid?"บันทึกจ่ายแล้ว":"ยกเลิกการจ่ายแล้ว"); }
  else alert("ไม่สำเร็จ: "+(r.error||""));
}

// ======== ลบโครงการ ========
async function confirmDeleteProject(id, title){
  if(!confirm(`ยืนยันลบโครงการ "${title}" (${id})?\nข้อมูลทุกอย่างจะถูกลบถาวร`)) return;
  const r = await api("deleteProject",{projectId:id});
  if(r.ok){ closeDrawer(); await refresh(); showToast(`ลบโครงการ "${title}" แล้ว`); }
  else alert("ลบไม่สำเร็จ: "+(r.error||""));
}

// ======== MODAL: เพิ่ม/แก้ไข งบประมาณรายปี ========
function showAddBudget(existing){
  const b = existing || {};
  const isEdit = !!b.year;
  const curYear = new Date().getFullYear() + 543;
  openModal(`<div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h2>${isEdit?"✎ แก้ไขปีงบประมาณ":"+ เพิ่มปีงบประมาณ"}</h2>
      <button class="btn ghost" style="padding:6px 12px" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>ปีงบประมาณ (พ.ศ.) *</label>
        ${isEdit
          ? `<input id="b_year" type="number" value="${b.year}" readonly style="background:var(--ivory);color:var(--muted)"/>`
          : `<input id="b_year" type="number" value="${curYear}" placeholder="${curYear}"/>`}
      </div>
      <div class="field">
        <label>งบประมาณที่จัดสรร (฿) *</label>
        <input id="b_alloc" type="number" value="${b.allocated||''}" placeholder="5000000"/>
      </div>
      ${isEdit?`<div class="note">โครงการวิจัยในปีนี้: <b>${b.projectCount||0}</b> โครงการ · ผูกพัน <b>${fmtBaht(b.committed)}</b> ฿</div>`:""}
    </div>
    <div class="modal-footer">
      <div id="budgetErr" style="color:var(--red);font-size:12px;margin-right:auto;align-self:center"></div>
      ${isEdit?`<button class="btn danger" id="delBudgetBtn" onclick="deleteBudgetYear(${b.year})">🗑 ลบปีนี้</button>`:""}
      <button class="btn ghost" onclick="closeModal()">ยกเลิก</button>
      <button class="btn" id="saveBudgetBtn" onclick="saveBudget(${isEdit?b.year:'null'})">${isEdit?"บันทึกการแก้ไข":"เพิ่มปีงบประมาณ"}</button>
    </div>
  </div>`);
}

async function saveBudget(existingYear){
  const errEl = document.getElementById("budgetErr");
  const btn   = document.getElementById("saveBudgetBtn");
  errEl.textContent = "";
  const budgetYear = Number(document.getElementById("b_year").value);
  const allocated  = Number(document.getElementById("b_alloc").value);
  if(!budgetYear){ errEl.textContent="กรุณากรอกปีงบประมาณ"; return; }
  if(!allocated){ errEl.textContent="กรุณากรอกงบที่จัดสรร"; return; }
  btn.classList.add("saving"); btn.textContent="กำลังบันทึก...";
  try {
    const r = await api("upsertBudget",{budgetYear, allocated});
    if(!r.ok){ errEl.textContent=r.error||"บันทึกไม่สำเร็จ"; btn.classList.remove("saving"); btn.textContent="บันทึก"; return; }
    closeModal();
    const bg = await api("listBudget");
    S.budget = bg.data||[];
    render();
    showToast(`บันทึกงบประมาณปี ${budgetYear} แล้ว`);
  } catch(e){ errEl.textContent=e.message; btn.classList.remove("saving"); btn.textContent="บันทึก"; }
}

async function deleteBudgetYear(year){
  if(!confirm(`ยืนยันลบงบประมาณปี ${year}?\n(ข้อมูลโครงการจะไม่ถูกลบ แต่จะไม่แสดงในสรุปงบประมาณ)`)) return;
  const r = await api("deleteBudget",{budgetYear:year});
  if(r.ok){ closeModal(); const bg=await api("listBudget"); S.budget=bg.data||[]; render(); showToast(`ลบงบประมาณปี ${year} แล้ว`); }
  else alert("ลบไม่สำเร็จ: "+(r.error||""));
}
</script>

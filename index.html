<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ระบบติดตามสถานะทุนวิจัย</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Noto+Serif+Thai:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ivory:#FAF7F0;--paper:#FFFFFF;--ink:#1F2933;--muted:#6B7280;
    --line:#E3DCCB;--oxblood:#7B2D2D;--blue:#2B5F8A;--amber:#C98A12;
    --green:#2E7D5B;--red:#C0392B;--grey:#6B7280;--violet:#5B4B8A;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"IBM Plex Sans Thai",sans-serif;background:var(--ivory);color:var(--ink);font-size:14px;}
  h1,h2,h3{font-family:"Noto Serif Thai",serif;margin:0;}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;}
  .btn{background:var(--blue);color:#fff;padding:9px 16px;font-weight:600;}
  .btn:hover{filter:brightness(.95);}
  .btn.ghost{background:transparent;color:var(--blue);border:1px solid var(--line);}
  .btn.danger{background:var(--red);}
  .btn.amber{background:var(--amber);}
  .btn.green{background:var(--green);}
  input,select{font-family:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;width:100%;background:#fff;}
  label{font-size:12px;color:var(--muted);font-weight:600;display:block;margin-bottom:4px;}
  .hidden{display:none!important;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:18px;}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;color:#fff;}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid var(--line);}
  /* Login */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  #login .box{width:380px;max-width:100%;}
  #login h1{color:var(--oxblood);font-size:22px;margin-bottom:4px;}
  .quick{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
  .quick button{background:var(--ivory);border:1px solid var(--line);color:var(--ink);padding:8px;font-size:12px;font-weight:600;}
  /* App shell */
  #app{display:grid;grid-template-columns:230px 1fr;min-height:100vh;}
  #side{background:#22303C;color:#D7DEE4;padding:18px 12px;display:flex;flex-direction:column;}
  #side h2{color:#fff;font-size:16px;padding:0 8px 14px;}
  #side .nav{padding:10px 12px;border-radius:8px;color:#C3CCD4;font-weight:600;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;cursor:pointer;}
  #side .nav:hover{background:#2C3D4B;}
  #side .nav.active{background:var(--blue);color:#fff;}
  #side .nav .n{background:var(--amber);color:#000;border-radius:999px;font-size:11px;padding:0 7px;}
  #side .who{margin-top:auto;font-size:12px;color:#9AA7B1;padding:10px 8px;border-top:1px solid #33424F;}
  #main{padding:22px 26px;overflow:auto;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .grid{display:grid;gap:14px;}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));}
  .kpi .v{font-size:24px;font-weight:700;font-family:"Noto Serif Thai",serif;}
  .kpi .l{font-size:12px;color:var(--muted);}
  table{width:100%;border-collapse:collapse;background:#fff;}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);font-size:13px;}
  th{color:var(--muted);font-size:12px;}
  tr.click:hover{background:var(--ivory);cursor:pointer;}
  .bar{height:8px;background:var(--line);border-radius:999px;overflow:hidden;}
  .bar>i{display:block;height:100%;background:var(--blue);}
  /* Drawer */
  #scrim{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:10;}
  #drawer{position:fixed;top:0;right:0;height:100vh;width:520px;max-width:92vw;background:#fff;box-shadow:-8px 0 24px rgba(0,0,0,.15);overflow:auto;padding:22px;z-index:11;}
  .sect{margin-top:18px;}
  .sect h3{font-size:14px;color:var(--oxblood);margin-bottom:8px;border-bottom:1px solid var(--line);padding-bottom:6px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .muted{color:var(--muted);}
  .err{color:var(--red);font-size:12px;margin-top:6px;}
  .note{background:#FFF6E8;border:1px solid #F0DCB0;color:#7a5b12;padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:14px;}
  a{color:var(--blue);}
  /* Loading */
  .loading{display:flex;align-items:center;gap:10px;color:var(--muted);padding:20px;}
  .spinner{width:20px;height:20px;border:2px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  /* Modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:20;display:flex;align-items:center;justify-content:center;padding:16px;}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:580px;max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
  .modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px 16px;border-bottom:1px solid var(--line);}
  .modal-header h2{font-size:18px;color:var(--oxblood);}
  .modal-body{padding:20px 24px;}
  .modal-footer{padding:16px 24px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;}
  .field{margin-bottom:14px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
  .field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
  .reviewer-card{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;background:var(--ivory);}
  .reviewer-card .rc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-weight:600;font-size:13px;color:var(--oxblood);}
  .section-label{font-size:13px;font-weight:700;color:var(--ink);margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line);}
  input:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(43,95,138,.12);}
  .btn-icon{background:transparent;border:1px solid var(--line);color:var(--red);padding:4px 10px;font-size:12px;border-radius:6px;}
  .btn-icon:hover{background:#fff0f0;}
  .saving{opacity:.6;pointer-events:none;}
</style>
</head>
<body>

<div id="login">
  <div class="box card">
    <h1>ระบบติดตามสถานะทุนวิจัย</h1>
    <p class="muted" style="margin-top:0">สำนักงานบริหารงานวิจัย</p>
    <div style="margin-bottom:10px"><label>ชื่อผู้ใช้</label><input id="uid" value=""/></div>
    <div style="margin-bottom:12px"><label>รหัสผ่าน</label><input id="pwd" type="password" value="" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="btn" style="width:100%" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div id="loginerr" class="err"></div>
    <div class="quick">
      <button onclick="quick('admin')">admin</button>
      <button onclick="quick('staff')">staff</button>
      <button onclick="quick('dean')">dean</button>
      <button onclick="quick('reviewer')">reviewer</button>
    </div>
    <p class="muted" style="font-size:11px;margin-bottom:0">บัญชีทดสอบ รหัสผ่าน <b>1234</b> ทุกบัญชี</p>
  </div>
</div>

<div id="app" class="hidden">
  <aside id="side">
    <h2>ทุนวิจัย</h2>
    <div id="nav"></div>
    <div class="who">
      <div id="whoName"></div>
      <div id="whoRole" class="muted"></div>
      <button class="btn ghost" style="margin-top:8px;width:100%;color:#D7DEE4;border-color:#3a4a57" onclick="logout()">ออกจากระบบ</button>
    </div>
  </aside>
  <main id="main">
    <div class="topbar"><h1 id="pageTitle" style="font-size:20px"></h1><div id="pageActions"></div></div>
    <div id="view"></div>
  </main>
</div>

<div id="scrim" class="hidden" onclick="closeDrawer()"></div>
<div id="drawer" class="hidden"></div>

<script>
// ======== ใส่ URL GAS Web App (/exec) ========
const API_URL = "https://script.google.com/macros/s/AKfycbxW2HESXQGHsqEA4CdVXm-w6kye1d1RrvwEWsVYysY7TwB4iE2Mgqve_1KXj2GQF6VX/exec";

// ======== STATE ========
let S = { user:null, token:null, projects:[], budget:[], due:[], users:[], page:"dash" };

// ======== UTILS ========
const fmtBaht = n => Number(n||0).toLocaleString("th-TH",{maximumFractionDigits:0});
const fmtDate = s => s ? new Date(s).toLocaleDateString("th-TH",{day:"numeric",month:"short",year:"numeric"}) : "—";
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

const STATUS_COLOR = {
  "ทำสัญญาแล้ว":"var(--blue)","รายงานความก้าวหน้าครั้งที่ 1":"var(--blue)",
  "ส่งเล่มสมบูรณ์":"var(--violet)","รอการประเมิน":"var(--amber)",
  "ปิดโครงการ":"var(--green)","ยุติโครงการ":"var(--grey)","รอคืนเงิน":"var(--red)"
};
const HEALTH_COLOR = {"ปกติ":"var(--green)","ใกล้กำหนด":"var(--amber)","ล่าช้า":"var(--red)","เสร็จสิ้น":"var(--grey)"};
const statusBadge = s => `<span class="badge" style="background:${STATUS_COLOR[s]||'var(--grey)'}">${esc(s)}</span>`;
const healthBadge = h => `<span class="pill" style="color:${HEALTH_COLOR[h]||'var(--grey)'};border-color:${HEALTH_COLOR[h]||'var(--grey)'}">${esc(h)}</span>`;
const kpi = (v,l,c) => `<div class="card kpi"><div class="v" style="color:${c||'var(--ink)'}">${v}</div><div class="l">${l}</div></div>`;
const loading = () => `<div class="loading"><div class="spinner"></div>กำลังโหลด...</div>`;

// ======== API ========
async function api(action, payload={}) {
  const url = new URL(API_URL);
  url.searchParams.set("action", action);
  url.searchParams.set("token", S.token||"");
  url.searchParams.set("payload", JSON.stringify(payload));
  const res = await fetch(url.toString(), { method:"GET", redirect:"follow" });
  const data = await res.json();
  if(data.ok===false && data.error==="unauthorized"){ logout(); throw new Error("เซสชันหมดอายุ"); }
  return data;
}

// ======== AUTH ========
function quick(id){ document.getElementById("uid").value=id; document.getElementById("pwd").value="1234"; doLogin(); }

async function doLogin(){
  const errEl = document.getElementById("loginerr");
  errEl.textContent = "";
  const userId = document.getElementById("uid").value.trim();
  const password = document.getElementById("pwd").value;
  if(!userId||!password){ errEl.textContent="กรุณากรอกข้อมูลให้ครบ"; return; }
  try {
    const r = await api("login", {userId, password});
    if(!r.ok){ errEl.textContent = r.error||"เข้าสู่ระบบไม่สำเร็จ"; return; }
    S.user  = r.user;
    S.token = r.token;
    // ตั้ง page เริ่มต้นครั้งเดียวตอน login
    const menu = MENUS[r.user.role]||[];
    S.page = menu[0] ? menu[0][0] : "dash";
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("whoName").textContent = r.user.name;
    document.getElementById("whoRole").textContent = r.user.roleLabel;
    buildNav();
    // แสดงหน้า dash ก่อนแล้วโหลดข้อมูล background
    render();
    loadData();
  } catch(e){ errEl.textContent = e.message; }
}

function logout(){
  S = {user:null,token:null,projects:[],budget:[],due:[],users:[],page:"dash"};
  document.getElementById("app").classList.add("hidden");
  document.getElementById("login").classList.remove("hidden");
  document.getElementById("uid").value="";
  document.getElementById("pwd").value="";
}

// ======== NAV ========
const MENUS = {
  admin:   [["dash","Dashboard"],["projects","โครงการวิจัย"],["budget","งบประมาณรายปี"],["reminders","การติดตาม/แจ้งเตือน"],["evals","การประเมิน"],["users","จัดการผู้ใช้"]],
  staff:   [["dash","Dashboard"],["projects","โครงการวิจัย"],["budget","งบประมาณรายปี"],["reminders","การติดตาม/แจ้งเตือน"],["evals","การประเมิน"]],
  dean:    [["overview","ภาพรวมผู้บริหาร"]],
  reviewer:[["myreviews","งานประเมินของฉัน"]]
};

// buildNav ไม่แตะ S.page เลย — แค่ highlight เมนูที่ active
function buildNav(){
  const menu = MENUS[S.user.role]||[];
  document.getElementById("nav").innerHTML = menu.map(([k,label])=>{
    const badge = k==="reminders" && S.due.length ? `<span class="n">${S.due.length}</span>` : "";
    return `<div class="nav${k===S.page?' active':''}" onclick="go('${k}')">${esc(label)}${badge}</div>`;
  }).join("");
}

// go เปลี่ยน page แล้ว rebuild nav + render — ไม่มีการ reset
function go(page){
  S.page = page;
  buildNav();
  render();
}

// ======== DATA LOADING (แยกออกจาก render เพื่อความเร็ว) ========
async function loadData(){
  // โหลด 3 อันพร้อมกัน
  try {
    const [pr, bg, du] = await Promise.all([
      api("listProjects"),
      api("listBudget"),
      api("dueSoon")
    ]);
    S.projects = pr.data||[];
    S.budget   = bg.data||[];
    S.due      = du.data||[];
  } catch(e){ console.error("loadData error", e); }

  // โหลด users แยก (เฉพาะ admin)
  if(S.user.role==="admin"){
    try { S.users = (await api("listUsers")).data||[]; } catch(e){}
  }

  // อัปเดต nav badge + re-render หน้าปัจจุบัน
  buildNav();
  render();
}

// refresh = โหลดใหม่ทั้งหมด (ใช้หลัง write action)
async function refresh(){ await loadData(); }

// ======== RENDER ========
const PAGE_TITLE = {
  dash:"Dashboard ทีมงาน", projects:"โครงการวิจัย", budget:"งบประมาณรายปี",
  reminders:"การติดตาม / แจ้งเตือน", evals:"การประเมิน", users:"จัดการผู้ใช้",
  overview:"ภาพรวมผู้บริหาร", myreviews:"งานประเมินของฉัน"
};
const VIEW_FN = {
  dash:viewDash, projects:viewProjects, budget:viewBudget,
  reminders:viewReminders, evals:viewEvals, users:viewUsers,
  overview:viewOverview, myreviews:viewMyReviews
};

function render(){
  document.getElementById("pageTitle").textContent = PAGE_TITLE[S.page]||"";
  document.getElementById("pageActions").innerHTML = "";
  const v = document.getElementById("view");
  const fn = VIEW_FN[S.page];
  if(fn) fn(v); else v.innerHTML = "";
}

// ======== VIEWS ========
function projectTable(list){
  if(!list.length) return `<p class="muted">ไม่มีข้อมูล</p>`;
  return `<table><thead><tr>
    <th>รหัส</th><th>ชื่อโครงการ</th><th>หัวหน้า</th>
    <th>สถานะ</th><th>สุขภาพ</th><th>กำหนดถัดไป</th>
  </tr></thead><tbody>${list.map(p=>`
    <tr class="click" onclick="openDrawer('${p.id}')">
      <td><b>${esc(p.id)}</b></td>
      <td>${esc(p.title)}</td>
      <td>${esc(p.pi)}</td>
      <td>${statusBadge(p.status)}</td>
      <td>${healthBadge(p.health)}</td>
      <td>${p.milestone ? fmtDate(p.milestone.date)+` <span class="muted">(${p.milestone.daysLeft} วัน)</span>` : "—"}</td>
    </tr>`).join("")}</tbody></table>`;
}

function viewDash(v){
  const P = S.projects;
  if(!P.length){ v.innerHTML=loading(); return; }
  const active = P.filter(p=>["ปกติ","ใกล้กำหนด","ล่าช้า"].includes(p.health)).length;
  const late   = P.filter(p=>p.health==="ล่าช้า").length;
  const soon   = P.filter(p=>p.health==="ใกล้กำหนด").length;
  const paid   = P.reduce((s,p)=>s+p.paid,0);
  v.innerHTML = `
    <div class="grid kpis" style="margin-bottom:16px">
      ${kpi(P.length,"โครงการทั้งหมด")}
      ${kpi(active,"กำลังดำเนินการ")}
      ${kpi(soon,"ใกล้กำหนด","var(--amber)")}
      ${kpi(late,"ล่าช้า","var(--red)")}
      ${kpi(fmtBaht(paid)+" ฿","เบิกจ่ายสะสม")}
    </div>
    <div class="card">${projectTable(P)}</div>`;
}

function viewProjects(v){
  if(["admin","staff"].includes(S.user.role))
    document.getElementById("pageActions").innerHTML =
      `<button class="btn" onclick="showAddProject()">+ เพิ่มโครงการ</button>`;
  v.innerHTML = `<div class="card">${projectTable(S.projects)}</div>`;
}

function viewBudget(v){
  if(["admin","staff"].includes(S.user.role))
    document.getElementById("pageActions").innerHTML =
      `<button class="btn" onclick="showAddBudget()">+ เพิ่มปีงบประมาณ</button>`;
  if(!S.budget.length){ v.innerHTML=loading(); return; }
  v.innerHTML = `<div class="card"><table><thead><tr>
    <th>ปีงบประมาณ (พ.ศ.)</th><th>จัดสรร</th><th>ผูกพัน</th>
    <th>เบิกจ่าย</th><th>คงเหลือ</th><th style="width:160px">สัดส่วนผูกพัน</th><th></th>
  </tr></thead><tbody>${S.budget.map(b=>{
    const pct = b.allocated ? Math.min(100,Math.round(b.committed/b.allocated*100)) : 0;
    return `<tr>
      <td><b>${b.year}</b></td>
      <td>${fmtBaht(b.allocated)}</td><td>${fmtBaht(b.committed)}</td>
      <td>${fmtBaht(b.paid)}</td><td>${fmtBaht(b.remaining)}</td>
      <td><div class="bar"><i style="width:${pct}%"></i></div>
        <span class="muted" style="font-size:11px">${pct}%</span></td>
      <td><button class="btn ghost" style="padding:5px 10px;font-size:12px"
        onclick='showAddBudget(${JSON.stringify(b)})'>✎ แก้ไข</button></td>
    </tr>`;}).join("")}</tbody></table></div>`;
}

function viewReminders(v){
  if(!S.due.length){ v.innerHTML=`<div class="card"><p class="muted">ไม่มีรายการใกล้กำหนด/ล่าช้า</p></div>`; return; }
  v.innerHTML = `<div class="card"><table><thead><tr>
    <th>รหัส</th><th>โครงการ</th><th>รายการ</th><th>กำหนด</th><th>เหลือ</th><th></th>
  </tr></thead><tbody>${S.due.map(d=>`
    <tr>
      <td><b>${esc(d.id)}</b></td><td>${esc(d.title)}</td><td>${esc(d.label)}</td>
      <td>${fmtDate(d.dueDate)}</td>
      <td>${healthBadge(d.health)} ${d.daysLeft} วัน</td>
      <td><button class="btn amber" onclick="sendReminder('${d.id}')">ส่งอีเมลเตือน</button></td>
    </tr>`).join("")}</tbody></table></div>`;
}

async function sendReminder(id){
  if(!confirm("ส่งอีเมลแจ้งเตือนไปยังผู้ขอทุน?")) return;
  const r = await api("sendReminder",{projectId:id});
  alert(r.ok ? "ส่งอีเมลแล้ว" : "ส่งไม่สำเร็จ: "+(r.error||""));
}

function viewEvals(v){
  const list = S.projects.filter(p=>p.reviewers&&p.reviewers.length);
  if(!list.length){ v.innerHTML=`<div class="card"><p class="muted">ยังไม่มีโครงการที่อยู่ระหว่างประเมิน</p></div>`; return; }
  v.innerHTML = list.map(p=>`
    <div class="card" style="margin-bottom:12px">
      <b>${esc(p.id)}</b> — ${esc(p.title)} ${statusBadge(p.status)}
      <table style="margin-top:8px"><thead><tr>
        <th>ผู้ประเมิน</th><th>สถานะ</th><th>ผล</th><th>หมายเหตุ</th>
      </tr></thead><tbody>${p.reviewers.map(r=>`
        <tr>
          <td>${esc(r.name)}</td><td>${esc(r.status)}</td>

async function saveProject(existingId){
  const btn = document.getElementById("saveProjectBtn");
  const errEl = document.getElementById("formErr");
  errEl.textContent = "";

  const title    = document.getElementById("f_title").value.trim();
  const pi       = document.getElementById("f_pi").value.trim();
  const year     = Number(document.getElementById("f_year").value);
  const duration = Number(document.getElementById("f_duration").value);
  const contract = document.getElementById("f_contract").value;
  const total    = Number(document.getElementById("f_total").value);
  const dept     = document.getElementById("f_dept").value.trim();
  const status   = document.getElementById("f_status").value;
  const piPhone  = document.getElementById("f_phone").value.trim();
  const piEmail  = document.getElementById("f_email").value.trim();

  // Validate
  if(!title){ errEl.textContent="กรุณากรอกชื่อโครงการ"; return; }
  if(!pi)   { errEl.textContent="กรุณากรอกชื่อหัวหน้าโครงการ"; return; }
  if(!contract){ errEl.textContent="กรุณาเลือกวันทำสัญญา"; return; }
  if(!total){ errEl.textContent="กรุณากรอกวงเงินรวม"; return; }

  // Installments
  const installments = [0,1,2].map(idx=>({
    no: idx+1,
    amount: Number(document.getElementById(`f_inst${idx}_amt`).value)||0,
    paid: document.getElementById(`f_inst${idx}_paid`).value==="true",
    paidDate: document.getElementById(`f_inst${idx}_date`).value||""
  }));

  // Reviewers
  const reviewers = [];
  document.querySelectorAll(".reviewer-card").forEach(card=>{
    const name = card.querySelector(".rv-name").value.trim();
    if(name) reviewers.push({
      name, status:"รอประเมิน",
      phone: card.querySelector(".rv-phone").value.trim(),
      email: card.querySelector(".rv-email").value.trim()
    });
  });

  const payload = { title, pi, piPhone, piEmail, dept, budgetYear:year,
    total, contractDate:contract, durationMonths:duration, status, installments, reviewers };
  if(existingId) payload.id = existingId;

  btn.classList.add("saving");
  btn.textContent = "กำลังบันทึก...";

  try {
    const action = existingId ? "updateProject" : "createProject";
    const r = await api(action, payload);
    if(!r.ok){ errEl.textContent = r.error||"บันทึกไม่สำเร็จ"; btn.classList.remove("saving"); btn.textContent=existingId?"บันทึกการแก้ไข":"สร้างโครงการ"; return; }
    closeModal();
    await refresh();
  } catch(e){
    errEl.textContent = e.message;
    btn.classList.remove("saving");
    btn.textContent = existingId?"บันทึกการแก้ไข":"สร้างโครงการ";
  }
}

  const amount = Number(document.getElementById("b_amount").value);
  if(!year)  { errEl.textContent="กรุณากรอกปีงบประมาณ"; return; }
  if(!amount){ errEl.textContent="กรุณากรอกจำนวนงบ"; return; }
  btn.classList.add("saving"); btn.textContent="กำลังบันทึก...";
  try {
    const r = await api("upsertBudget",{budgetYear:year, allocated:amount});
    if(!r.ok){ errEl.textContent=r.error||"บันทึกไม่สำเร็จ"; btn.classList.remove("saving"); btn.textContent=existingYear?"บันทึกการแก้ไข":"เพิ่มปีงบประมาณ"; return; }
    closeModal();
    await refresh();
  } catch(e){
    errEl.textContent=e.message;
    btn.classList.remove("saving");
    btn.textContent=existingYear?"บันทึกการแก้ไข":"เพิ่มปีงบประมาณ";
  }
}
</script>
</body>
</html>
